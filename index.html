<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Wars Kingdom — Creature Wiki</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ===== CSS VARS — faction colors + general palette ===== */
    :root {
      --bg:       #0d0f1a;
      --surface:  #151828;
      --card-bg:  #1a1e30;
      --border:   #2a2f4a;
      --text:     #e8e4d9;
      --muted:    #7a7a9a;
      --accent:   #f0c040;

      /* faction colors — had to guess a few of these lol */
      --blue:    #3a8de8;
      --red:     #e84040;
      --green:   #44c468;
      --yellow:  #f0c040;
      --orange:  #f07020;
      --white:   #d0d8f0;
      --dark:    #8855cc;
      --black:   #555577;
      --light:   #ffe88a;
      --colorless: #aaaaaa;

      /* rarity stars */
      --r1: #aaaaaa;
      --r2: #88aaff;
      --r3: #ffcc44;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    header {
      background: linear-gradient(180deg, #08090f 0%, var(--bg) 100%);
      border-bottom: 2px solid var(--border);
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* subtle star/magic bg — kept it simple, nothing crazy */
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(240,192,64,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    header h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.4rem, 4vw, 2.8rem);
      color: var(--accent);
      text-shadow: 0 0 40px rgba(240,192,64,0.4);
      letter-spacing: 0.05em;
    }

    header p {
      font-family: 'Cinzel', serif;
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 0.4rem;
      letter-spacing: 0.1em;
    }

    /* ===== CONTROLS / FILTERS ===== */
    .controls {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .search-wrap {
      flex: 1;
      min-width: 180px;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.75rem 0.5rem 2.2rem;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus { border-color: var(--accent); }

    .search-wrap::before {
      content: '🔍';
      position: absolute;
      left: 0.6rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.85rem;
      pointer-events: none;
    }

    /* filter chips */
    .filter-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      align-items: center;
    }

    .filter-label {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-right: 0.2rem;
    }

    .chip {
      cursor: pointer;
      padding: 0.28rem 0.65rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--muted);
      font-size: 0.78rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      transition: all 0.15s;
      user-select: none;
    }

    .chip:hover { border-color: var(--accent); color: var(--text); }
    .chip.active { background: var(--accent); color: #1a1200; border-color: var(--accent); }

    /* faction chips get faction color when active */
    .chip[data-faction="Blue"].active    { background: var(--blue);    border-color: var(--blue);    color: #fff; }
    .chip[data-faction="Red"].active     { background: var(--red);     border-color: var(--red);     color: #fff; }
    .chip[data-faction="Green"].active   { background: var(--green);   border-color: var(--green);   color: #000; }
    .chip[data-faction="Yellow"].active  { background: var(--yellow);  border-color: var(--yellow);  color: #000; }
    .chip[data-faction="Orange"].active  { background: var(--orange);  border-color: var(--orange);  color: #fff; }
    .chip[data-faction="White"].active   { background: var(--white);   border-color: var(--white);   color: #111; }
    .chip[data-faction="Dark"].active    { background: var(--dark);    border-color: var(--dark);    color: #fff; }
    .chip[data-faction="Black"].active   { background: var(--black);   border-color: var(--black);   color: #fff; }
    .chip[data-faction="Light"].active   { background: var(--light);   border-color: var(--light);   color: #000; }
    .chip[data-faction="Colorless"].active { background: var(--colorless); border-color: var(--colorless); color: #111; }

    /* count badge */
    #count-badge {
      margin-left: auto;
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ===== GRID ===== */
    .grid-wrap {
      padding: 1.5rem;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
    }

    /* ===== CREATURE CARD ===== */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
      position: relative;
    }

    .card:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    /* top colored bar = faction color */
    .card-faction-bar {
      height: 3px;
      width: 100%;
    }

    .card-img-wrap {
      width: 100%;
      aspect-ratio: 1;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      /* slight zoom on hover handled via parent .card:hover transform */
    }

    /* fallback when image 404s — happens a lot with some weird sprites */
    .card-img-wrap .fallback {
      font-size: 2rem;
      opacity: 0.3;
    }

    .card-info {
      padding: 0.5rem 0.6rem 0.6rem;
    }

    .card-name {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 0.35rem;
      /* truncate long names, they get really long sometimes */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.3rem;
    }

    .card-class {
      font-size: 0.62rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stars {
      display: flex;
      gap: 1px;
    }

    .star {
      font-size: 0.6rem;
    }

    /* ===== MODAL ===== */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      backdrop-filter: blur(4px);
    }

    #modal-overlay.open { display: flex; }

    #modal {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      animation: modalIn 0.2s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.92) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    #modal-close {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #modal-close:hover { color: var(--text); }

    #modal-img-wrap {
      width: 100%;
      aspect-ratio: 1 / 0.7;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px 16px 0 0;
      overflow: hidden;
    }

    #modal-img {
      max-height: 220px;
      max-width: 80%;
      object-fit: contain;
    }

    #modal-body {
      padding: 1.2rem 1.4rem 1.5rem;
    }

    #modal-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.15rem;
      color: var(--accent);
      margin-bottom: 0.3rem;
    }

    #modal-tags {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .tag {
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #modal-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem 1rem;
      margin-bottom: 1rem;
    }

    .stat-row {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .stat-label {
      font-size: 0.62rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-family: 'Cinzel', serif;
    }

    .stat-value {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text);
    }

    .stat-bar-wrap {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 2px;
    }

    .stat-bar {
      height: 100%;
      border-radius: 2px;
      background: var(--accent);
    }

    #modal-evo {
      margin-top: 0.75rem;
      padding: 0.6rem 0.8rem;
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--muted);
    }

    #modal-evo strong { color: var(--text); }

    /* ===== EMPTY STATE ===== */
    #empty {
      display: none;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
    }

    #empty h3 {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }

    /* ===== FACTION DOT ON CARD ===== */
    .faction-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 3px;
      flex-shrink: 0;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      #grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 0.7rem; }
      header h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>⚔️ Card Wars Kingdom</h1>
  <p>Creature Encyclopedia · <span id="total-count">0</span> creatures</p>
</header>

<div class="controls">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search creatures..." autocomplete="off" />
  </div>

  <div class="filter-group">
    <span class="filter-label">Faction</span>
    <!-- chips injected by JS so I don't have to hardcode all 10 -->
    <div id="faction-chips" style="display:flex;flex-wrap:wrap;gap:0.35rem;"></div>
  </div>

  <div class="filter-group">
    <span class="filter-label">Class</span>
    <div id="class-chips" style="display:flex;flex-wrap:wrap;gap:0.35rem;"></div>
  </div>

  <div class="filter-group">
    <span class="filter-label">Rarity</span>
    <div id="rarity-chips" style="display:flex;flex-wrap:wrap;gap:0.35rem;"></div>
  </div>

  <span id="count-badge">— creatures</span>
</div>

<div class="grid-wrap">
  <div id="grid"></div>
  <div id="empty">
    <h3>No creatures found</h3>
    <p>Try adjusting your filters</p>
  </div>
</div>

<!-- modal -->
<div id="modal-overlay">
  <div id="modal">
    <button id="modal-close" aria-label="Close">✕</button>
    <div id="modal-img-wrap">
      <img id="modal-img" src="" alt="" />
    </div>
    <div id="modal-body">
      <div id="modal-name"></div>
      <div id="modal-tags"></div>
      <div id="modal-stats"></div>
      <div id="modal-evo" style="display:none"></div>
    </div>
  </div>
</div>

<script>
// ===== CONFIG =====
// images live in the same repo under Assets/Resources/ui/icons_creatures/
// adjust this path if you move things around
const IMG_BASE = 'icons_creatures/';

// faction color map — mirrors the CSS vars
const FACTION_COLORS = {
  Blue:      '#3a8de8',
  Red:       '#e84040',
  Green:     '#44c468',
  Yellow:    '#f0c040',
  Orange:    '#f07020',
  White:     '#d0d8f0',
  Dark:      '#8855cc',
  Black:     '#555577',
  Light:     '#ffe88a',
  Colorless: '#aaaaaa',
};

// rarity labels — game uses 1/2/3 numerically
const RARITY_LABELS = { 1: '★ Common', 2: '★★ Rare', 3: '★★★ Epic' };
const RARITY_STAR_COLORS = { 1: '#aaaaaa', 2: '#88aaff', 3: '#ffcc44' };

// ===== STATE =====
let allCreatures = [];
let activeFilters = {
  search: '',
  factions: new Set(),
  classes: new Set(),
  rarities: new Set(),
};

// ===== LOAD DATA =====
// fetch the creatures json, build UI once it's loaded
fetch('creatures.json')
  .then(r => r.json())
  .then(data => {
    allCreatures = data;
    document.getElementById('total-count').textContent = data.length;
    buildFilters(data);
    render();
  })
  .catch(err => {
    // if you're opening this as a file:// locally, CORS will block the fetch
    // just serve it with `python3 -m http.server` and it'll work
    console.error('Failed to load creatures.json - if local, serve via http server', err);
  });

// ===== BUILD FILTER CHIPS =====
function buildFilters(data) {
  const factions = [...new Set(data.map(c => c.faction).filter(Boolean))].sort();
  const classes  = [...new Set(data.map(c => c.class).filter(Boolean))].sort();
  const rarities = [...new Set(data.map(c => c.rarity).filter(Boolean))].sort((a,b) => a-b);

  buildChips('faction-chips', factions, 'faction', f => {
    activeFilters.factions.has(f) ? activeFilters.factions.delete(f) : activeFilters.factions.add(f);
    render();
  }, f => `data-faction="${f}"`);

  buildChips('class-chips', classes, 'class', c => {
    activeFilters.classes.has(c) ? activeFilters.classes.delete(c) : activeFilters.classes.add(c);
    render();
  });

  buildChips('rarity-chips', rarities, 'rarity', r => {
    activeFilters.rarities.has(r) ? activeFilters.rarities.delete(r) : activeFilters.rarities.add(r);
    render();
  }, r => '', r => '★'.repeat(r));
}

function buildChips(containerId, items, filterKey, onClick, extraAttr = () => '', labelFn = x => x) {
  const wrap = document.getElementById(containerId);
  items.forEach(item => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = labelFn(item);
    chip.setAttribute('title', item);
    // set extra attrs (like data-faction for CSS coloring)
    const extra = extraAttr(item);
    if (extra) {
      const [k, v] = extra.split('=');
      chip.setAttribute(k, v.replace(/"/g,''));
    }
    chip.addEventListener('click', () => {
      onClick(item);
      // toggle active class
      chip.classList.toggle('active');
    });
    wrap.appendChild(chip);
  });
}

// ===== SEARCH INPUT =====
document.getElementById('search').addEventListener('input', e => {
  activeFilters.search = e.target.value.toLowerCase().trim();
  render();
});

// ===== FILTER LOGIC =====
function getFiltered() {
  return allCreatures.filter(c => {
    if (activeFilters.search) {
      const searchable = `${c.name} ${c.id} ${c.faction} ${c.class}`.toLowerCase();
      if (!searchable.includes(activeFilters.search)) return false;
    }
    if (activeFilters.factions.size && !activeFilters.factions.has(c.faction)) return false;
    if (activeFilters.classes.size && !activeFilters.classes.has(c.class)) return false;
    if (activeFilters.rarities.size && !activeFilters.rarities.has(c.rarity)) return false;
    return true;
  });
}

// ===== RENDER GRID =====
function render() {
  const filtered = getFiltered();
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const badge = document.getElementById('count-badge');

  badge.textContent = `${filtered.length} creatures`;

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';

  // build all cards as a doc fragment — don't hammer the DOM with 300 appends
  const frag = document.createDocumentFragment();
  filtered.forEach(creature => frag.appendChild(makeCard(creature)));
  grid.innerHTML = '';
  grid.appendChild(frag);
}

function makeCard(c) {
  const div = document.createElement('div');
  div.className = 'card';
  div.setAttribute('data-id', c.id);

  const factionColor = FACTION_COLORS[c.faction] || '#555';
  const imgSrc = `${IMG_BASE}${c.sprite}.png`;

  div.innerHTML = `
    <div class="card-faction-bar" style="background:${factionColor}"></div>
    <div class="card-img-wrap">
      <img
        src="${imgSrc}"
        alt="${c.name}"
        loading="lazy"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
      />
      <div class="fallback" style="display:none">❓</div>
    </div>
    <div class="card-info">
      <div class="card-name">${formatName(c.name)}</div>
      <div class="card-meta">
        <span class="card-class">${c.class || ''}</span>
        <span class="stars">${renderStars(c.rarity)}</span>
      </div>
    </div>
  `;

  div.addEventListener('click', () => openModal(c));
  return div;
}

// turns "CoolDog Base" → "Cool Dog" etc. the names in the data are kinda raw
function formatName(raw) {
  return raw
    .replace(/ Base$/, '')
    .replace(/ Awaken$/, ' ✦')
    .replace(/ Evo$/, ' ✦')
    .replace(/([a-z])([A-Z])/g, '$1 $2'); // CamelCase -> Camel Case
}

function renderStars(rarity) {
  const color = RARITY_STAR_COLORS[rarity] || '#aaa';
  return '★'.repeat(rarity || 1).split('').map(s =>
    `<span class="star" style="color:${color}">${s}</span>`
  ).join('');
}

// ===== MODAL =====
function openModal(c) {
  const overlay  = document.getElementById('modal-overlay');
  const imgEl    = document.getElementById('modal-img');
  const nameEl   = document.getElementById('modal-name');
  const tagsEl   = document.getElementById('modal-tags');
  const statsEl  = document.getElementById('modal-stats');
  const evoEl    = document.getElementById('modal-evo');
  const imgWrap  = document.getElementById('modal-img-wrap');

  const factionColor = FACTION_COLORS[c.faction] || '#555';

  imgWrap.style.background = `linear-gradient(135deg, #0d0f1a 0%, ${factionColor}22 100%)`;
  imgEl.src = `${IMG_BASE}${c.sprite}.png`;
  imgEl.alt = c.name;
  imgEl.onerror = () => { imgEl.style.display = 'none'; };

  nameEl.textContent = formatName(c.name);
  nameEl.style.color = factionColor;

  // tags
  tagsEl.innerHTML = [
    makeBadge(c.faction, factionColor),
    makeBadge(c.class, '#445'),
    makeBadge(RARITY_LABELS[c.rarity] || '', RARITY_STAR_COLORS[c.rarity] || '#aaa'),
    c.attackStyle ? makeBadge(c.attackStyle, '#334') : '',
  ].join('');

  // stats — normalize to 0-100% for bar widths using rough max values
  // HP max around 2000, STR/INT around 600 — eyeballed from the data
  const HP_MAX  = 2000;
  const STR_MAX = 600;
  const INT_MAX = 600;

  const minHP  = parseFloat(c.minHP)  || 0;
  const maxHP  = parseFloat(c.maxHP)  || 0;
  const minSTR = parseFloat(c.minSTR) || 0;
  const maxSTR = parseFloat(c.maxSTR) || 0;
  const minINT = parseFloat(c.minINT) || 0;
  const maxINT = parseFloat(c.maxINT) || 0;

  statsEl.innerHTML = `
    ${statRow('HP', minHP, maxHP, HP_MAX, '#e05050')}
    ${statRow('STR', minSTR, maxSTR, STR_MAX, '#e08030')}
    ${statRow('INT', minINT, maxINT, INT_MAX, '#5080e0')}
    ${statRow2('Deploy Cost', c.deployCost)}
    ${statRow2('Attack Cost', c.attackCost)}
  `;

  // evo chain
  if (c.evoTo) {
    const evoTarget = allCreatures.find(x => x.id === c.evoTo);
    const evoName = evoTarget ? formatName(evoTarget.name) : c.evoTo;
    evoEl.style.display = '';
    evoEl.innerHTML = `⚗️ Evolves to: <strong>${evoName}</strong>`;
  } else {
    evoEl.style.display = 'none';
  }

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function makeBadge(label, color) {
  if (!label) return '';
  // lighten the color for text bg
  return `<span class="tag" style="background:${color}22;color:${color};border:1px solid ${color}44">${label}</span>`;
}

function statRow(label, min, max, maxVal, barColor) {
  const pct = Math.min(100, Math.round((max / maxVal) * 100));
  return `
    <div class="stat-row">
      <span class="stat-label">${label}</span>
      <span class="stat-value">${Math.round(min)} – ${Math.round(max)}</span>
      <div class="stat-bar-wrap"><div class="stat-bar" style="width:${pct}%;background:${barColor}"></div></div>
    </div>
  `;
}

function statRow2(label, value) {
  return `
    <div class="stat-row">
      <span class="stat-label">${label}</span>
      <span class="stat-value">${value ?? '—'}</span>
    </div>
  `;
}

// close modal
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
</script>
