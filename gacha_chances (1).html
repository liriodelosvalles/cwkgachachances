<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CWK Gacha Chances</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d0f1a;
    --surface:   #161927;
    --surface2:  #1e2235;
    --border:    #2a2f47;
    --accent:    #7c5cfc;
    --accent2:   #c084fc;
    --gold:      #f0c040;
    --text:      #e8eaf6;
    --muted:     #6b7280;
    --star1:     #90a0b0;
    --star2:     #4aade8;
    --star3:     #f0c040;
    --bar-low:   #4a6fa5;
    --bar-mid:   #7c5cfc;
    --bar-high:  #c084fc;
    --radius:    10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  .page-header {
    background: linear-gradient(135deg, #0d0f1a 0%, #1a1040 50%, #0d0f1a 100%);
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 1rem 1rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .page-header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(124,92,252,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .page-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.2rem, 4vw, 2rem);
    background: linear-gradient(135deg, #a78bfa, #f0c040);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: .04em;
    position: relative;
  }
  .page-subtitle {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: .35rem;
    position: relative;
  }

  /* ── Chest tabs ── */
  .chest-tabs {
    display: flex;
    justify-content: center;
    gap: .5rem;
    padding: .9rem 1rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .chest-tab {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: .4rem 1.1rem;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: .9rem;
    color: var(--muted);
    cursor: pointer;
    transition: all .18s;
    letter-spacing: .04em;
  }
  .chest-tab:hover { border-color: var(--accent); color: var(--text); }
  .chest-tab.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color: transparent;
    color: #fff;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: .6rem;
    padding: .75rem 1rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 180px;
    max-width: 320px;
  }
  .search-wrap svg {
    position: absolute;
    left: .7rem; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    width: 15px; height: 15px;
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .45rem .7rem .45rem 2.1rem;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: .9rem;
    outline: none;
    transition: border-color .18s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .45rem .7rem;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: .9rem;
    outline: none;
    cursor: pointer;
    transition: border-color .18s;
  }
  select:focus { border-color: var(--accent); }

  .stat-pill {
    margin-left: auto;
    font-size: .8rem;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: .3rem .8rem;
    white-space: nowrap;
  }
  .stat-pill span { color: var(--accent2); font-weight: 700; }

  /* ── Grid ── */
  .grid-wrap { padding: 1rem; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: .75rem;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: .75rem;
    cursor: pointer;
    transition: border-color .18s, transform .12s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    background: linear-gradient(135deg, rgba(124,92,252,0.04), transparent);
    pointer-events: none;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); }

  /* Card header */
  .card-header {
    display: flex;
    align-items: center;
    gap: .55rem;
  }
  .card-icon-wrap {
    width: 52px; height: 52px;
    flex-shrink: 0;
    background: rgba(0,0,0,0.3);
    border-radius: 7px;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .card-icon {
    width: 52px; height: 52px;
    object-fit: contain;
    image-rendering: pixelated;
  }
  .card-header-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: .15rem;
  }
  .card-top-row {
    display: flex;
    align-items: center;
    gap: .4rem;
  }
  .star-badge {
    font-size: .7rem;
    font-weight: 700;
    padding: .1rem .35rem;
    border-radius: 4px;
    letter-spacing: .03em;
    flex-shrink: 0;
  }
  .star-1 { background: rgba(144,160,176,.15); color: var(--star1); border: 1px solid rgba(144,160,176,.3); }
  .star-2 { background: rgba(74,173,232,.15); color: var(--star2); border: 1px solid rgba(74,173,232,.3); }
  .star-3 { background: rgba(240,192,64,.15); color: var(--star3); border: 1px solid rgba(240,192,64,.3); }
  .card-name {
    font-size: .9rem;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: .03em;
  }
  .awaken-tag {
    display: inline-block;
    font-size: .65rem;
    font-weight: 700;
    background: linear-gradient(135deg, rgba(192,132,252,.2), rgba(124,92,252,.2));
    border: 1px solid rgba(192,132,252,.4);
    color: var(--accent2);
    border-radius: 3px;
    padding: 0 .3rem;
    letter-spacing: .05em;
    text-transform: uppercase;
    margin-left: .3rem;
    vertical-align: middle;
  }
  .card-pct {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: .02em;
  }
  .card-pct.zero { color: var(--muted); }

  /* Bar */
  .card-bar-wrap {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    margin-top: .55rem;
    overflow: hidden;
  }
  .card-bar {
    height: 100%;
    border-radius: 2px;
    transition: width .3s ease;
  }
  .bar-low  { background: var(--bar-low); }
  .bar-mid  { background: var(--bar-mid); }
  .bar-high { background: linear-gradient(90deg, var(--bar-mid), var(--bar-high)); }

  /* Expanded detail */
  .card-detail {
    display: none;
    margin-top: .65rem;
    padding-top: .6rem;
    border-top: 1px solid var(--border);
    animation: fadeIn .15s ease;
  }
  .card-detail.open { display: block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: .2rem 0;
    font-size: .82rem;
  }
  .detail-chest { color: var(--muted); font-weight: 600; }
  .detail-val   { font-weight: 700; color: var(--text); }
  .detail-val.zero { color: var(--muted); }

  /* Empty state */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 1rem;
  }
</style>
</head>

</div>

t":100,"PremiumChest":50,"GoldChest":3}}},{"name":"TheGhost","spriteBase":"Creature_Ghost","spriteAwaken":"Creature_Ghost","Base":{"star":3,"weights":{"StandardChest":100,"PremiumChest":65,"GoldChest":0}}},{"name":"UglyTree","spriteBase":"Creature_TreeOfUgliness","spriteAwaken":"Creature_TreeOfUgliness","Base":{"star":3,"weights":{"StandardChest":100,"PremiumChest":54,"GoldChest":0}}},{"name":"WallOfChocolate","spriteBase":"Creature_WallOfChocolate","spriteAwaken":"Creature_WallOfChocolate","Base":{"star":3,"weights":{"StandardChest":100,"PremiumChest":50,"GoldChest":3}}},{"name":"WhiteCat","spriteBase":"Creature_WhiteCat","spriteAwaken":"Creature_WhiteCat","Base":{"star":3,"weights":{"StandardChest":0,"PremiumChest":44,"GoldChest":0}}}],"chests":["StandardChest","PremiumChest","GoldChest"],"totals":{"StandardChest":128975,"PremiumChest":26062,"GoldChest":2796},"chestLabels":{"StandardChest":"Standard Chest","PremiumChest":"Premium Chest","GoldChest":"Gold Chest"}};

const { creatures, chests, totals, chestLabels } = RAW_DATA;

const ACTIVE_CHESTS = chests.filter(c => totals[c] > 0);

// ── State ─────────────────────────────────────────────────────────────────────
let selectedChest = ACTIVE_CHESTS[0];
let searchQuery   = '';
let starFilter    = 'all';
let formFilter    = 'all';
let sortBy        = 'chance';
let expandedCard  = null;

// ── Chest tabs ────────────────────────────────────────────────────────────────
const tabsEl = document.getElementById('chest-tabs');
ACTIVE_CHESTS.forEach(chest => {
  const btn = document.createElement('button');
  btn.className = 'chest-tab' + (chest === selectedChest ? ' active' : '');
  btn.textContent = chestLabels[chest] || chest;
  btn.onclick = () => {
    selectedChest = chest;
    expandedCard = null;
    tabsEl.querySelectorAll('.chest-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  };
  tabsEl.appendChild(btn);
});

// ── Controls ──────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value; expandedCard = null; render();
});
document.getElementById('star-filter').addEventListener('change', e => {
  starFilter = e.target.value; expandedCard = null; render();
});
document.getElementById('form-filter').addEventListener('change', e => {
  formFilter = e.target.value; expandedCard = null; render();
});
document.getElementById('sort-by').addEventListener('change', e => {
  sortBy = e.target.value; render();
});

// ── Helpers ───────────────────────────────────────────────────────────────────
const IMG_BASE = 'icons_creatures/';

function getSprite(cr, form) {
  return form === 'Awaken' ? (cr.spriteAwaken || cr.spriteBase || '') : (cr.spriteBase || '');
}

function fmtPct(pct) {
  if (pct === 0) return '0%';
  if (pct < 0.01) return '<0.01%';
  return pct.toFixed(pct < 0.1 ? 3 : pct < 1 ? 2 : 2) + '%';
}

function barClass(pct) {
  if (pct === 0) return 'bar-low';
  if (pct < 1)   return 'bar-low';
  if (pct < 3)   return 'bar-mid';
  return 'bar-high';
}

function splitName(name) {
  // Insert space before capital letters after lowercase (camelCase split)
  return name.replace(/([a-z])([A-Z])/g, '$1 $2').replace(/_/g,' ');
}

// ── Build rows ────────────────────────────────────────────────────────────────
function buildRows() {
  const total = totals[selectedChest];
  const rows = [];
  const q = searchQuery.toLowerCase();

  creatures.forEach(cr => {
    ['Base','Awaken'].forEach(form => {
      const data = cr[form];
      if (!data) return;
      if (formFilter !== 'all' && form !== formFilter) return;
      if (starFilter !== 'all' && data.star !== parseInt(starFilter)) return;
      if (q && !cr.name.toLowerCase().includes(q)) return;

      const weight = data.weights[selectedChest] || 0;
      const pct    = total > 0 ? (weight / total) * 100 : 0;

      rows.push({ cr, form, name: cr.name, star: data.star, weight, pct });
    });
  });

  if (sortBy === 'chance') rows.sort((a,b) => b.pct - a.pct || a.name.localeCompare(b.name));
  else if (sortBy === 'name') rows.sort((a,b) => a.name.localeCompare(b.name));
  else if (sortBy === 'star') rows.sort((a,b) => b.star - a.star || b.pct - a.pct);

  return rows;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const grid  = document.getElementById('grid');
  const rows  = buildRows();
  const total = totals[selectedChest];

  document.getElementById('showing-count').textContent = rows.length;
  grid.innerHTML = '';

  if (rows.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'No creatures match your filters.';
    grid.appendChild(empty);
    return;
  }

  const maxPct = rows[0]?.pct || 1;

  rows.forEach(row => {
    const id = row.name + '_' + row.form;
    const isExpanded = expandedCard === id;
    const barW = maxPct > 0 ? Math.max(2, (row.pct / maxPct) * 100) : 0;
    const sprite = getSprite(row.cr, row.form);

    // Detail rows for all chests
    const allChestRows = ACTIVE_CHESTS.map(c => {
      const w = row.cr[row.form].weights[c] || 0;
      const p = totals[c] > 0 ? (w / totals[c]) * 100 : 0;
      return `<div class="detail-row">
        <span class="detail-chest">${chestLabels[c] || c}</span>
        <span class="detail-val ${p===0?'zero':''}">${fmtPct(p)} <span style="color:var(--muted);font-weight:400;font-size:.75rem">(${w.toLocaleString()})</span></span>
      </div>`;
    }).join('');

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header">
        <div class="card-icon-wrap">
          <img
            class="card-icon"
            src="${IMG_BASE}${sprite}.png"
            alt="${row.name}"
            loading="lazy"
            onerror="this.style.display='none';this.parentElement.style.background='transparent'"
          />
        </div>
        <div class="card-header-info">
          <div class="card-top-row">
            <div class="star-badge star-${row.star}">${'★'.repeat(row.star)}</div>
            <div class="card-name">${splitName(row.name)}${row.form==='Awaken' ? '<span class="awaken-tag">Awaken</span>' : ''}</div>
          </div>
          <div class="card-pct ${row.pct===0?'zero':''}">${fmtPct(row.pct)}</div>
        </div>
      </div>
      <div class="card-bar-wrap">
        <div class="card-bar ${barClass(row.pct)}" style="width:${barW}%"></div>
      </div>
      <div class="card-detail ${isExpanded ? 'open' : ''}">
        <div style="font-size:.75rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem">All Chest Rates</div>
        ${allChestRows}
        <div style="margin-top:.5rem;font-size:.75rem;color:var(--muted)">Weight in <em>${chestLabels[selectedChest]}</em>: ${row.weight.toLocaleString()} / ${total.toLocaleString()}</div>
      </div>
    `;

    card.onclick = () => {
      expandedCard = expandedCard === id ? null : id;
      render();
    };

    grid.appendChild(card);
  });
}

render();
</script>
